<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Teste Login</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px">
<h2>Teste de Login</h2>
<div id="msg"></div>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
var msg = document.getElementById('msg')

function log(t) { msg.innerHTML += t + '<br>' }

log('config.js carregado: SUPA_URL=' + (typeof SUPA_URL !== 'undefined' ? 'SIM' : 'NAO'))
log('supabase CDN carregado: ' + (typeof supabase !== 'undefined' ? 'SIM' : 'NAO'))

try {
  const { createClient } = supabase
  const db = createClient(SUPA_URL, SUPA_KEY)
  log('db criado: SIM')

  // Testar registro
  async function testar() {
    log('--- Testando registo ---')
    try {
      var r = await db.auth.signUp({ email: 'testpage@barbearia.com', password: '123456' })
      log('Registo: ' + (r.error ? 'ERRO: ' + r.error.message : 'OK - user: ' + (r.data.user ? 'SIM' : 'NAO')))
      
      if (r.data.user) {
        log('--- Testando login ---')
        var l = await db.auth.signInWithPassword({ email: 'testpage@barbearia.com', password: '123456' })
        log('Login: ' + (l.error ? 'ERRO: ' + l.error.message : 'OK - session: ' + (l.data.session ? 'SIM' : 'NAO')))
      }
    } catch(e) {
      log('ERRO: ' + e.message)
    }
  }
  testar()
} catch(e) {
  log('ERRO ao criar db: ' + e.message)
}
</script>
</body>
</html>
