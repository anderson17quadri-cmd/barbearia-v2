<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Barbearia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--surface:#101010;--surface2:#181818;--border:#222;--accent:#C9A84C;--accent2:#E8C96A;--text:#f0f0f0;--text2:#777;--danger:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;max-width:480px;margin:0 auto}
#tela_auth{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;background:radial-gradient(ellipse at 50% -20%,rgba(201,168,76,.12) 0%,#080808 60%)}
.logo{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;margin-bottom:6px}
.logo span{color:var(--accent);font-style:italic}
.msg{font-size:14px;padding:12px;border-radius:10px;margin-top:12px;text-align:center;width:100%}
.msg.erro{background:#150808;border:1px solid rgba(231,76,60,.3);color:#e88}
.msg.ok{background:#081510;border:1px solid rgba(46,204,113,.3);color:#6da}
.box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px;box-shadow:0 40px 80px rgba(0,0,0,.4)}
.tabs{display:flex;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:11px;text-align:center;border-radius:9px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text2);border:none;background:transparent}
.tab.active{background:var(--accent);color:#000}
.field{margin-bottom:16px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.field input{width:100%;padding:15px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;font-family:'Inter',sans-serif}
.field input:focus{border-color:var(--accent)}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px}
.btn:active{transform:scale(.97)}
#tela_app{display:none;padding:16px;text-align:center;padding-top:100px}
#tela_app h2{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:16px}
#tela_app p{color:var(--text2);margin-bottom:24px}
</style>
<link rel="stylesheet" href="pro.css">
</head>
<body>

<div id="tela_auth">
  <div class="logo">Agenda<span>mento</span>.pt</div>
  <div style="color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:36px">Painel para barbearias</div>
  <div class="box">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Entrar</button>
      <button class="tab" onclick="switchTab('registro')">Registar</button>
    </div>
    <div id="form_login">
      <div class="field"><label>Email</label><input type="email" id="login_email" placeholder="o@teu.email"></div>
      <div class="field"><label>Password</label><input type="password" id="login_pass" placeholder="••••••••"></div>
      <button class="btn" onclick="fazerLogin()">Entrar no painel</button>
    </div>
    <div id="form_registro" style="display:none">
      <div class="field"><label>Nome da barbearia</label><input type="text" id="reg_nome" placeholder="Barbearia do João"></div>
      <div class="field"><label>Email</label><input type="email" id="reg_email"></div>
      <div class="field"><label>Password</label><input type="password" id="reg_pass" placeholder="mínimo 6 caracteres"></div>
      <button class="btn" onclick="fazerRegistro()">Criar conta gratuita</button>
    </div>
    <div class="msg erro" id="msg_erro" style="display:none"></div>
    <div class="msg ok" id="msg_ok" style="display:none"></div>
  </div>
</div>

<div id="tela_app">
  <h2>✅ Login bem-sucedido!</h2>
  <p>O login está a funcionar corretamente.</p>
  <button class="btn" onclick="sair()" style="width:200px;margin:0 auto">Sair</button>
</div>

<script>
var SUPABASE_URL = 'https://ogtyffrokangokeqlufr.supabase.co'
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ndHlmZnJva2FuZ29rZXFsdWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NzE1NjIsImV4cCI6MjA5ODA0NzU2Mn0.fdHAQlS9OM0bEwjpPB0rJOSFPlhhX7gButoxPWy-Fts'

function msg(txt, tipo) {
  var e = document.getElementById('msg_' + tipo)
  e.style.display = 'block'
  e.textContent = txt
  setTimeout(function(){ e.style.display = 'none' }, 4000)
}

function switchTab(t) {
  document.getElementById('form_login').style.display = t === 'login' ? 'block' : 'none'
  document.getElementById('form_registro').style.display = t === 'registro' ? 'block' : 'none'
  document.querySelectorAll('.tab')[0].classList.toggle('active', t === 'login')
  document.querySelectorAll('.tab')[1].classList.toggle('active', t === 'registro')
}

async function fazerRegistro() {
  var nome = document.getElementById('reg_nome').value.trim()
  var email = document.getElementById('reg_email').value.trim()
  var pass = document.getElementById('reg_pass').value
  if (!nome || !email || !pass) { msg('Preenche todos os campos', 'erro'); return }

  var res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: pass })
  })
  var data = await res.json()
  if (data.error || res.status >= 400) {
    msg('Erro: ' + (data.msg || data.error_description || JSON.stringify(data)), 'erro')
    return
  }
  msg('Conta criada! ID: ' + (data.user ? data.user.id.substring(0,8)+'...' : 'OK'), 'ok')
  // Criar barbearia
  await fetch(SUPABASE_URL + '/rest/v1/barbearias', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + data.access_token, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ user_id: data.user.id, nome: nome, email: email, ativo: true })
  })
  msg('Barbearia criada! Agora faz login.', 'ok')
  switchTab('login')
}

async function fazerLogin() {
  var email = document.getElementById('login_email').value.trim()
  var pass = document.getElementById('login_pass').value
  if (!email || !pass) { msg('Preenche email e password', 'erro'); return }

  try {
    var res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: pass })
    })
    var data = await res.json()
    if (data.error || res.status >= 400) {
      msg('Erro: ' + (data.error_description || data.msg || JSON.stringify(data)), 'erro')
      return
    }
    document.getElementById('tela_auth').style.display = 'none'
    document.getElementById('tela_app').style.display = 'block'
  } catch(e) {
    msg('Erro de rede: ' + e.message, 'erro')
  }
}

function sair() {
  document.getElementById('tela_app').style.display = 'none'
  document.getElementById('tela_auth').style.display = 'flex'
}
</script>
</body>
</html>
