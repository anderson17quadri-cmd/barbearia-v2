<div id="offline_banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;text-align:center;background:rgba(231,76,60,.95);color:#fff;padding:8px;font-size:13px;font-weight:600">⚠️ Sem ligação à internet</div>

<div id="loading">A gerar cartaz...</div>
<canvas id="preview" style="display:none"></canvas>
<div class="btns" style="display:none" id="btns">
  <button class="btn btn_gold" onclick="guardar()">💾 Guardar</button>
  <button class="btn btn_share" onclick="partilhar()">↗️ Partilhar</button>
</div>

<script>
var { createClient } = supabase
var db = createClient(SUPA_URL, SUPA_KEY)

var params = new URLSearchParams(window.location.search)
var barb_id = params.get('b') || ''
var barb_nome = decodeURIComponent(params.get('n') || 'A minha barbearia')
var link_url = APP_URL + '/cliente.html?b=' + barb_id

var SCALE = 3
var W = 400
var H = 600
var canvas = document.getElementById('preview')
canvas.width = W * SCALE
canvas.height = H * SCALE
canvas.style.width = W + 'px'
canvas.style.height = H + 'px'
var ctx = canvas.getContext('2d')
ctx.scale(SCALE, SCALE)

let logo_img = null

var qr_img = new Image()
qr_img.crossOrigin = 'anonymous'
qr_img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=' + encodeURIComponent(link_url) + '&bgcolor=ffffff&color=0a0a0a&margin=8'

async function init_cartaz() {
  if(barb_id) {
    var { data: barb } = await db.from('barbearias').select('logo_url').eq('id', barb_id).maybeSingle()
    if(barb && barb.logo_url) {
      logo_img = new Image()
      logo_img.crossOrigin = 'anonymous'
      await new Promise(function(r) { logo_img.onload = r; logo_img.onerror = r; logo_img.src = barb.logo_url })
    }
  }
  await new Promise(function(r) { if(qr_img.complete) r(); else qr_img.onload = r })
  desenhar(qr_img)
  document.getElementById('loading').style.display = 'none'
  canvas.style.display = 'block'
  document.getElementById('btns').style.display = 'flex'
}
init_cartaz()

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath()
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r)
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r)
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r)
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r)
  ctx.closePath()
}

function desenhar(qr) {
  // === FUNDO ===
  ctx.fillStyle = '#080808'
  ctx.fillRect(0, 0, W, H)

  // Textura de fundo - gradiente radial subtil
  var bg_grad = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, W*0.8)
  bg_grad.addColorStop(0, 'rgba(201,168,76,0.06)')
  bg_grad.addColorStop(1, 'rgba(0,0,0,0)')
  ctx.fillStyle = bg_grad
  ctx.fillRect(0, 0, W, H)

  // === BORDA DOURADA ===
  var border_grad = ctx.createLinearGradient(0,0,W,H)
  border_grad.addColorStop(0, '#C9A84C')
  border_grad.addColorStop(0.5, '#E8C96A')
  border_grad.addColorStop(1, '#8B6914')
  ctx.strokeStyle = border_grad
  ctx.lineWidth = 2
  rr(ctx, 2, 2, W-4, H-4, 18)
  ctx.stroke()

  // === TOPO — POWERED BY ===
  ctx.fillStyle = 'rgba(201,168,76,0.45)'
  ctx.font = '700 10px Inter'
  ctx.textAlign = 'center'
  ctx.letterSpacing = '3px'
  ctx.fillText('P O W E R E D   B Y', W/2, 36)

  // === LOGO AGENDAMENTO.PT ===
  ctx.font = 'italic 700 32px Georgia, serif'
  ctx.textAlign = 'left'
  var t1 = 'Agendado'
  var t2 = '.pt'
  var w1 = ctx.measureText(t1).width
  var w2 = ctx.measureText(t2).width
  var lx = W/2 - (w1+w2)/2
  ctx.fillStyle = '#f0f0f0'
  ctx.fillText(t1, lx, 70)
  ctx.fillStyle = '#C9A84C'
  ctx.fillText(t2, lx + w1, 70)

  // Linha separadora topo
  var sep_grad = ctx.createLinearGradient(0,0,W,0)
  sep_grad.addColorStop(0, 'rgba(201,168,76,0)')
  sep_grad.addColorStop(0.5, 'rgba(201,168,76,0.4)')
  sep_grad.addColorStop(1, 'rgba(201,168,76,0)')
  ctx.strokeStyle = sep_grad
  ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(30,90); ctx.lineTo(W-30,90); ctx.stroke()

  // === NOME DA BARBEARIA ===
  ctx.textAlign = 'center'
  var nome_size = barb_nome.length > 18 ? 22 : barb_nome.length > 12 ? 28 : 34
  ctx.font = `700 ${nome_size}px Georgia, serif`
  ctx.fillStyle = '#f0f0f0'
  ctx.fillText(barb_nome, W/2, 130)

  // Tagline
  ctx.fillStyle = 'rgba(201,168,76,0.7)'
  ctx.font = '600 10px Inter'
  ctx.fillText('AGENDA ONLINE · 24 HORAS', W/2, 155)

  // === QR CODE — fundo branco arredondado ===
  var qr_size = 200
  var qr_x = W/2 - qr_size/2
  var qr_y = 180

  // Sombra dourada
  ctx.shadowColor = 'rgba(201,168,76,0.25)'
  ctx.shadowBlur = 24
  ctx.fillStyle = '#ffffff'
  rr(ctx, qr_x-12, qr_y-12, qr_size+24, qr_size+24, 16)
  ctx.fill()
  ctx.shadowBlur = 0

  // QR image
  ctx.drawImage(qr, qr_x, qr_y, qr_size, qr_size)

  // Cantos decorativos dourados
  var c = 16, t = 3
  var cx = qr_x-14, cy = qr_y-14, cs = qr_size+28
  ctx.strokeStyle = '#C9A84C'
  ctx.lineWidth = t
  ;[
    [cx, cy+c, cx, cy, cx+c, cy],
    [cx+cs-c, cy, cx+cs, cy, cx+cs, cy+c],
    [cx, cy+cs-c, cx, cy+cs, cx+c, cy+cs],
    [cx+cs-c, cy+cs, cx+cs, cy+cs, cx+cs, cy+cs-c]
  ].forEach(([x1,y1,x2,y2,x3,y3]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.stroke()
  })

  // === INSTRUÇÃO ===
  ctx.fillStyle = 'rgba(255,255,255,0.6)'
  ctx.font = '400 13px Inter'
  ctx.textAlign = 'center'
  ctx.fillText('📱 Aponta a câmara e marca em segundos', W/2, 430)

  // Linha separadora rodapé
  ctx.strokeStyle = sep_grad
  ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(30,455); ctx.lineTo(W-30,455); ctx.stroke()

  // === RODAPÉ — Logo ou marca ===
  if(logo_img && logo_img.complete && logo_img.naturalWidth > 0) {
    // Círculo dourado
    var cir_r = 40
    var cir_x = W/2
    var cir_y = 490

    // Sombra
    ctx.shadowColor = 'rgba(201,168,76,0.3)'
    ctx.shadowBlur = 16
    ctx.beginPath()
    ctx.arc(cir_x, cir_y, cir_r, 0, Math.PI*2)
    ctx.fillStyle = '#fff'
    ctx.fill()
    ctx.shadowBlur = 0

    // Borda dourada
    ctx.beginPath()
    ctx.arc(cir_x, cir_y, cir_r, 0, Math.PI*2)
    ctx.strokeStyle = '#C9A84C'
    ctx.lineWidth = 2.5
    ctx.stroke()

    // Logo dentro do círculo (clip)
    ctx.save()
    ctx.beginPath()
    ctx.arc(cir_x, cir_y, cir_r - 2, 0, Math.PI*2)
    ctx.clip()
    var logo_size = (cir_r - 2) * 2
    ctx.drawImage(logo_img, cir_x - cir_r + 2, cir_y - cir_r + 2, logo_size, logo_size)
    ctx.restore()

    // Slogan
    ctx.font = '400 10px Inter'
    ctx.fillStyle = 'rgba(201,168,76,0.5)'
    ctx.textAlign = 'center'
    ctx.fillText('A ferramenta dos melhores barbeiros.', W/2, 545)
  } else {
    ctx.font = 'italic 700 18px Georgia, serif'
    ctx.textAlign = 'left'
    var r1 = 'Agenda'
    var r2 = 'do'
    var r3 = '.pt'
    var rw1 = ctx.measureText(r1).width
    var rw2 = ctx.measureText(r2).width
    var rw3 = ctx.measureText(r3).width
    var rx = W/2 - (rw1+rw2+rw3)/2
    ctx.fillStyle = '#C9A84C'
    ctx.fillText(r1, rx, 490)
    ctx.fillStyle = 'rgba(255,255,255,0.7)'
    ctx.fillText(r2, rx+rw1, 490)
    ctx.fillStyle = '#C9A84C'
    ctx.fillText(r3, rx+rw1+rw2, 490)
    ctx.font = '400 11px Inter'
    ctx.fillStyle = 'rgba(201,168,76,0.5)'
    ctx.textAlign = 'center'
    ctx.fillText('A ferramenta dos melhores barbeiros.', W/2, 515)
  }
}

async function guardar() {
  var blob = await new Promise(r => canvas.toBlob(r, 'image/png'))
  var nome_ficheiro = 'cartaz-' + barb_nome.toLowerCase().replace(/\s+/g,'-') + '.png'
  var file = new File([blob], nome_ficheiro, { type: 'image/png' })
  if(navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({ files: [file], title: 'Cartaz ' + barb_nome })
  } else {
    var url = URL.createObjectURL(blob)
    var a = document.createElement('a')
    a.href = url; a.download = nome_ficheiro; a.click()
    URL.revokeObjectURL(url)
  }
}

async function partilhar() {
  if(navigator.share) {
    await navigator.share({ title: 'Agendado.pt — ' + barb_nome, text: 'Marca o teu próximo corte online!', url: link_url })
  } else { guardar() }
}
init_cartaz()
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(){})
  })
}
</script>
